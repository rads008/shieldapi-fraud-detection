<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldAPI • Fraud Protection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
<div class="max-w-4xl mx-auto p-8">
    <div class="text-center mb-10">
        <h1 class="text-5xl font-bold text-blue-400">🛡️ ShieldAPI</h1>
        <p class="text-zinc-400 mt-2">Real-time AI Fraud Detection • Live on Google Cloud</p>
    </div>

    <div class="bg-zinc-900 border border-white/10 rounded-3xl p-10">
        <h2 class="text-2xl font-semibold mb-8 text-center">Analyze Transaction</h2>

        <div class="grid grid-cols-2 gap-6">
            <div>
                <label class="block text-xs uppercase text-zinc-400 mb-2">Transaction ID</label>
                <input id="txId" type="text" value="tx-live-001" class="w-full bg-zinc-800 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-xs uppercase text-zinc-400 mb-2">Amount ($)</label>
                <input id="amount" type="number" value="100.5" class="w-full bg-zinc-800 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-blue-500">
            </div>
        </div>

        <button onclick="analyze()"
                class="mt-10 w-full bg-gradient-to-r from-blue-600 to-violet-600 py-6 rounded-3xl text-xl font-semibold hover:scale-105 transition-all">
            ANALYZE FOR FRAUD
        </button>

        <div id="result" class="mt-8"></div>
    </div>
</div>

<script>
    async function analyze() {
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `<div class="text-center py-8"><div class="animate-spin w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full mx-auto"></div><p class="mt-4">Analyzing...</p></div>`;

        const payload = {
            transactionId: document.getElementById('txId').value || "tx-live-001",
            TransactionAmt: parseFloat(document.getElementById('amount').value) || 100.5,
            ProductCD: "W",
            card1: 10000,
            card2: 200,
            card3: 150,
            card4: "visa",
            card5: 226,
            card6: "credit",
            addr1: 315.0,
            addr2: 87.0,
            dist1: 0.0,
            P_emaildomain: "gmail.com",
            C1: 1.0, C2: 1.0, C3: 0.0, C4: 0.0, C5: 0.0, C6: 1.0,
            C7: 0.0, C8: 0.0, C9: 1.0, C10: 0.0, C11: 1.0, C12: 0.0,
            C13: 1.0, C14: 0.0,
            D1: 14.0, D10: 13.0,
            V1: 1.0, V2: 1.0
        };

        try {
            const res = await fetch('https://shieldapi-gateway-938039674144.asia-south1.run.app/api/transactions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!res.ok) throw new Error('Server error');

            const data = await res.json();

            const color = data.riskLevel === 'HIGH' ? 'text-red-500' :
                data.riskLevel === 'MEDIUM' ? 'text-yellow-500' : 'text-emerald-500';

            resultDiv.innerHTML = `
              <div class="bg-zinc-900 border border-white/10 rounded-3xl p-8 text-center">
                <div class="text-7xl font-bold ${color}">${(data.fraudProbability * 100).toFixed(1)}%</div>
                <div class="text-sm uppercase tracking-widest mt-2">${data.riskLevel} RISK</div>
                <div class="mt-6 text-zinc-400">Latency: <span class="font-mono">${data.latencyMs.toFixed(0)} ms</span></div>
              </div>`;
        } catch (e) {
            resultDiv.innerHTML = `<div class="bg-red-500/10 border border-red-500 text-red-400 p-8 rounded-3xl text-center">Error: ${e.message}</div>`;
        }
    }
</script>
</body>
</html>
